name: ImmortalWrt ImageBuilder (x86_64)

on:
  workflow_dispatch: {}

jobs:
  build:
    name: Build ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: "x86_64", prefix: "x86-64-openwrt-", profile: "generic", rootfs: 2048 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure jq & curl
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Download local feed packages
        shell: bash
        run: ./prepare-local-feeds.sh

      - name: Resolve latest ImageBuilder tag for ${{ matrix.target.name }}
        id: resolve
        shell: bash
        env:
          PREFIX: ${{ matrix.target.prefix }}
        run: |
          set -euo pipefail
          # 25.12+ ImageBuilder uses APK feeds, but the locally packaged
          # Bandix dependencies are published as IPK. Pin the compatible
          # ImageBuilder release instead of silently switching package formats.
          TAG="${PREFIX}24.10.6"

          # 从 tag 提取版本号（去掉前缀里的 "x86-64-openwrt-"）
          VERSION="${TAG#$PREFIX}"

          echo "Resolved PREFIX:   $PREFIX"
          echo "Resolved TAG:      $TAG"
          echo "Resolved VERSION:  $VERSION"
          echo "Resolved IMAGE:    immortalwrt/imagebuilder:$TAG"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image=immortalwrt/imagebuilder:$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Pull ImageBuilder (${{ steps.resolve.outputs.tag }})
        run: docker pull ${{ steps.resolve.outputs.image }}

      - name: Build local feed index
        shell: bash
        run: |
          set -euo pipefail
          for feed_dir in feed/*; do
            [ -d "$feed_dir" ] || continue
            echo "==> 生成索引 [$(basename "$feed_dir")]"
            ./scripts/ipkg-make-index.sh "$feed_dir" > "$feed_dir/Packages"
            gzip -kf "$feed_dir/Packages"
          done

      - name: Prep out dir
        run: |
          mkdir -p out
          sudo chown -R $UID out || true
          chmod -R 777 out

      - name: Run ImageBuilder
        shell: bash
        run: |
          set -euo pipefail
          # 载入 .ci/immortalwrt.env 支持 \ 续行 或 () 数组
          source .ci/immortalwrt.env
          if declare -p PACKAGES >/dev/null 2>&1 && [[ $(declare -p PACKAGES 2>/dev/null) == "declare -a"* ]]; then
            PACKAGES="${PACKAGES[*]}"
          fi
          if declare -p CUSTOM_REPOSITORIES >/dev/null 2>&1 && [[ $(declare -p CUSTOM_REPOSITORIES 2>/dev/null) == "declare -a"* ]]; then
            CUSTOM_REPOSITORIES="$(printf '%s\n' "${CUSTOM_REPOSITORIES[@]}")"
          fi

          LOCAL_REPOS_FILE="$PWD/feed/custom-repositories.conf"
          if [[ -f "$LOCAL_REPOS_FILE" ]]; then
            LOCAL_REPOSITORIES="$(cat "$LOCAL_REPOS_FILE")"
            if [[ -n "$LOCAL_REPOSITORIES" ]]; then
              if [[ -n "${CUSTOM_REPOSITORIES:-}" ]]; then
                CUSTOM_REPOSITORIES+=$'\n'
              fi
              CUSTOM_REPOSITORIES+="$LOCAL_REPOSITORIES"
            fi
          fi

          echo "==> PACKAGES: $PACKAGES"
          echo "==> CUSTOM_REPOSITORIES: $CUSTOM_REPOSITORIES"

          docker run --rm \
            -e "PACKAGES=${PACKAGES}" \
            -e "CUSTOM_REPOSITORIES=${CUSTOM_REPOSITORIES:-}" \
            -e "PROFILE=${{ matrix.target.profile }}" \
            -e BIN_DIR=/out \
            -v "$PWD/out:/out" \
            -v "$PWD/feed:/work/feed:ro" \
            -v "$PWD/files:/work/files:ro" \
            -v "$PWD/build.sh:/work/build.sh:ro" \
            "${{ steps.resolve.outputs.image }}" \
            /bin/sh /work/build.sh

      - name: Make artifact name
        shell: bash
        run: |
          RAW="${{ matrix.target.name }}"
          SAFE="${RAW//\//_}"
          NAME="ImmortalWrt_${{ steps.resolve.outputs.version }}_${SAFE}"
          echo "ARTIFACT_NAME=$NAME" >> $GITHUB_ENV
          echo "Artifact name: $NAME"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            out/**/immortalwrt-*
          if-no-files-found: error
          compression-level: 5
          overwrite: true

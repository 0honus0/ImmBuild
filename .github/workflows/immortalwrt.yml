name: Build ImmortalWrt x86_64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 固定 IPK 兼容版本
      IMAGE: immortalwrt/imagebuilder:x86-64-openwrt-24.10.6

    steps:
      - uses: actions/checkout@v4

      - name: Download external packages
        run: ./download-packages.sh

      - name: Build image
        shell: bash
        run: |
          source .ci/immortalwrt.env
          # 容器内构建用户需要写入挂载的输出目录
          mkdir out
          chmod 777 out
          # 第三方 IPK 只读挂载后由 ImageBuilder 导入
          docker run --rm \
            -e "PACKAGES=${PACKAGES[*]}" \
            -e PROFILE=generic \
            -e BIN_DIR=/out \
            -v "$PWD/out:/out" \
            -v "$PWD/packages:/work/packages:ro" \
            -v "$PWD/files:/work/files:ro" \
            -v "$PWD/build.sh:/work/build.sh:ro" \
            "$IMAGE" /bin/sh /work/build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt_24.10.6_x86_64
          path: out/**/immortalwrt-*
          if-no-files-found: error
          compression-level: 5
